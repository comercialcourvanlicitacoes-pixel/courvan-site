<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>
    Como pequenas empresas podem vencer licitações sem equipe interna especializada
  </title>

  <meta
    name="description"

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #051020;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      line-height: 1.8;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
    }

    header {
      width: 100%;
      padding: 20px 8%;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky;
      top: 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(5, 16, 32, 0.85);
      z-index: 100;
    }

    .voltar {
      color: #d8a84e;

      font-size: 15px;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .voltar:hover {
      color: #ffffff;
      transform: translateX(-2px);
    }

    .hero {
      width: 100%;
      padding: 60px 8% 40px;
      background: radial-gradient(circle at top right, #0a2240 0%, #051020 100%);
    }

    .hero-content {
      max-width: 1100px;
      margin: auto;
    }

    .badge {
      display: inline-block;
      background: rgba(216, 168, 78, 0.1);
      color: #d8a84e;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 25px;
      border: 1px solid rgba(216, 168, 78, 0.2);
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: 44px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 24px;
      color: #ffffff;
      max-width: 900px;
      letter-spacing: -1px;
    }

    .subtitulo {
      max-width: 850px;
      font-size: 19px;
      color: #94a3b8;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
    }

    .hero-image {
      margin-top: 45px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    }

    .hero-image img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease;
    }
    
    .hero-image:hover img {
      transform: scale(1.02);
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 8% 80px;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 40px;
      align-items: start;
    }

    .article {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .card {
      background: rgba(12, 39, 72, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .card h2 {
      color: #ffffff;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 22px;
      line-height: 1.3;
      letter-spacing: -0.5px;
    }

    .card p {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 20px;
    }

    .card p:last-child {
      margin-bottom: 0;
    }

    .lista {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .lista li {
      list-style: none;
      background: #0d2748;
      padding: 14px 18px;
      border-radius: 12px;
      border-left: 4px solid #d8a84e;
      font-size: 15px;
      color: #e2e8f0;
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      border-right: 1px solid rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.02);
    }

    .destaque {
      color: #d8a84e;
      font-weight: 600;
      background: rgba(216, 168, 78, 0.05);
      padding: 15px;
      border-radius: 12px;
      border: 1px dashed rgba(216, 168, 78, 0.2);
    }

    .sidebar {
      position: sticky;
      top: 110px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .sidebar-card {
      background: #0d2748;
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .sidebar-card h3 {
      color: #d8a84e;
      margin-bottom: 16px;
      font-size: 19px;
      font-weight: 600;
      line-height: 1.4;
    }

    .sidebar-card p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: linear-gradient(135deg, #e5b85c 0%, #d8a84e 100%);
      color: #051020;
      padding: 14px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(216, 168, 78, 0.2);
    }
