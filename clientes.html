<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Courvan</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', Arial, sans-serif; /* Fonte atualizada para um visual mais moderno */
    }

    body{
      background: linear-gradient(135deg, #07162b 0%, #05101f 100%); /* Fundo em gradiente suave */
      color:white;
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:260px;
      background:#0c2748;
      padding:35px 25px;
      display:flex;
      flex-direction:column;
      gap:15px;
      border-right: 1px solid rgba(255, 255, 255, 0.05); /* Divisão sutil lateral */
    }

    .sidebar h2{
      color:#d8a84e;
      margin-bottom:25px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .sidebar a{
      color:#e2e8f0;
      text-decoration:none;
      background:#16385f;
      padding:14px;
      border-radius:10px;
      transition:0.3s;
      font-size: 15px;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .sidebar a:hover{
      background:#1d4b7d;
      color: white;
      transform: translateX(3px); /* Efeito de deslocamento suave */
    }

    .content{
      flex:1;
      padding:50px 40px;
    }

    .content h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    input{
      padding:14px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius:10px;
      width:250px;
      transition: 0.3s ease;
    }

    /* Feedback visual ao clicar no campo de pesquisa */
    input:focus {
      outline: none;
      border-color: #d8a84e !important;
      box-shadow: 0 0 0 3px rgba(216, 168, 78, 0.15);
    }

    .clientes{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
      gap:25px;
    }

    .card{
      background:#0c2748;
      padding:30px;
      border-radius:18px;
      transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 15px 35px rgba(0,0,0,0.35);
      border-color: rgba(216, 168, 78, 0.2);
    }

    .card h2{
      color:#d8a84e;
      margin-bottom:18px;
      font-size: 21px;
      font-weight: 700;
    }

    .card p {
      color: #cbd5e1;
      font-size: 14.5px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .card p strong {
      color: white;
    }

    .btn-abrir{
      width:100%;
      margin-top:20px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #d8a84e 0%, #f0d080 100%); /* Botão dourado premium */
      color: #07162b;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn-abrir:hover {
      filter: brightness(1.05);
      box-shadow: 0 4px 15px rgba(216, 168, 78, 0.2);
    }

    .logout{
      margin-top:auto;
      background:#7a2222 !important;
      color:#f8fafc !important;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
    }

    .sidebar a.logout:hover {
      background:#992d2d !important;
      transform: none;
    }

    @media(max-width:900px){
      body{flex-direction:column;}
      .sidebar{width:100%; padding: 25px;}
      .sidebar h2 { margin-bottom: 15px; }
      .content{padding:30px 20px;}
      input{width:100%;}
    }

  </style>
</head>

<body>

<div class="sidebar">

  <h2>Courvan</h2>

  <a href="clientes.html">👥 Clientes</a>
  <a href="admin.html">➕ Novo Cliente</a>
  <a href="#" id="logoutBtn" class="logout">🚪 Sair</a>

</div>

<div class="content">

  <h1 style="margin-bottom:25px;">Clientes</h1>

  <input
    type="text"
    id="pesquisaCliente"
    placeholder="Pesquisar cliente..."
    onkeyup="filtrarClientes()"
    style="
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:25px;
      background:#16385f;
      color:white;
    "
  >

  <div class="clientes" id="clientes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoBoaz6huE9gfAtBR4qf1ItMWzSwCEvLs",
  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema",
  storageBucket: "courvan-sistema.appspot.com",
  messagingSenderId: "729755072978",
  appId: "1:729755072978:web:e76e98fd704c10da34f00b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const clientesDiv = document.getElementById("clientes");

let unsubscribeClientes = null;

/* 🔐 LOGIN ADMIN */
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  if (user.email !== "comercial.courvanlicitacoes@gmail.com") {
    window.location.href = "cliente.html";
    return;
  }

  iniciarListenerClientes();

});

/* 🔥 LISTA EM TEMPO REAL */
function iniciarListenerClientes(){

  if (unsubscribeClientes) unsubscribeClientes();

  unsubscribeClientes = onSnapshot(
    collection(db, "clientes"),
    (snapshot) => {

      console.log("CLIENTES CARREGADOS:", snapshot.size);

      clientesDiv.innerHTML = "";

      snapshot.forEach((docItem) => {

        const cliente = docItem.data();

        const nome = cliente?.nome || "Sem nome";
        const empresa = cliente?.empresa || "-";
        const email = cliente?.email || "-";
        const status = cliente?.status || "-";

        const nomeLower = nome.toLowerCase();

        clientesDiv.innerHTML += `
          <div class="card cardCliente" data-nome="${nomeLower}">

            <h2>${nome}</h2>

            <p><strong>Empresa:</strong> ${empresa}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Status:</strong> ${status}</p>

            <button class="btn-abrir" onclick="abrirCliente('${docItem.id}')">
              Abrir Cliente
            </button>

            <button
              onclick="excluirCliente('${docItem.id}', '${nome}')"
              style="
                width:100%;
                margin-top:10px;
                background:#a83232;
                color:white;
                border:none;
                padding:12px;
                border-radius:10px;
              "
            >
              🗑 Excluir Cliente
            </button>

          </div>
        `;
      });
    }
  );
}

/* 🔓 LOGOUT */
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});

/* 🔥 ABRIR CLIENTE */
window.abrirCliente = function(id){
  window.location.href = `cliente.html?id=${id}`;
};

/* 🔍 FILTRO */
window.filtrarClientes = function(){

  const termo = document.getElementById("pesquisaCliente").value.toLowerCase();

  document.querySelectorAll(".cardCliente").forEach(card => {

    const nome = card.dataset.nome || "";

    card.style.display = nome.includes(termo) ? "block" : "none";

  });

};

/* 🗑 EXCLUIR */
window.excluirCliente = async function(id, nome){

  const confirmar = confirm(`Deseja excluir o cliente "${nome}"?`);
  if(!confirmar) return;

  const check = prompt("Digite EXCLUIR para confirmar");
  if(check !== "EXCLUIR") return;

  await deleteDoc(doc(db, "clientes", id));

  alert("Cliente excluído com sucesso");

};

</script>

</body>
</html>
