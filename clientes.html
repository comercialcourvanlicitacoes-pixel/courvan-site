<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Courvan</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#07162b;
      color:white;
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:260px;
      background:#0c2748;
      padding:30px;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .sidebar h2{
      color:#d8a84e;
      margin-bottom:20px;
    }

    .sidebar a{
      color:white;
      text-decoration:none;
      background:#16385f;
      padding:14px;
      border-radius:10px;
      transition:0.3s;
    }

    .sidebar a:hover{
      background:#1d4b7d;
    }

    .content{
      flex:1;
      padding:40px;
    }

    input{
      padding:14px;
      border:none;
      border-radius:10px;
      width:250px;
    }

    .clientes{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:20px;
    }

    .card{
      background:#0c2748;
      padding:25px;
      border-radius:18px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .card h2{
      color:#d8a84e;
      margin-bottom:15px;
    }

    .btn-abrir{
      width:100%;
      margin-top:15px;
    }

    .logout{
      margin-top:auto;
      background:#a83232 !important;
      color:white !important;
    }

    @media(max-width:900px){
      body{flex-direction:column;}
      .sidebar{width:100%;}
      .content{padding:25px;}
      input{width:100%;}
    }

  </style>
</head>

<body>

<div class="sidebar">

  <h2>Courvan</h2>

  <a href="clientes.html">👥 Clientes</a>
  <a href="admin.html">➕ Novo Cliente</a>
  <a href="#" id="logoutBtn" class="logout">🚪 Sair</a>

</div>

<div class="content">

  <h1 style="margin-bottom:25px;">Clientes</h1>

  <input
    type="text"
    id="pesquisaCliente"
    placeholder="Pesquisar cliente..."
    onkeyup="filtrarClientes()"
    style="
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:25px;
      background:#16385f;
      color:white;
    "
  >

  <div class="clientes" id="clientes"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoBoaz6huE9gfAtBR4qf1ItMWzSwCEvLs",
  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema",
  storageBucket: "courvan-sistema.appspot.com",
  messagingSenderId: "729755072978",
  appId: "1:729755072978:web:e76e98fd704c10da34f00b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const clientesDiv = document.getElementById("clientes");

let unsubscribeClientes = null;

/* 🔐 LOGIN ADMIN */
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  if (user.email !== "comercial.courvanlicitacoes@gmail.com") {
    window.location.href = "cliente.html";
    return;
  }

  iniciarListenerClientes();

});

/* 🔥 LISTA EM TEMPO REAL */
function iniciarListenerClientes(){

  if (unsubscribeClientes) unsubscribeClientes();

  unsubscribeClientes = onSnapshot(
    collection(db, "clientes"),
    (snapshot) => {

      console.log("CLIENTES CARREGADOS:", snapshot.size);

      clientesDiv.innerHTML = "";

      snapshot.forEach((docItem) => {

        const cliente = docItem.data();

        const nome = cliente?.nome || "Sem nome";
        const empresa = cliente?.empresa || "-";
        const email = cliente?.email || "-";
        const status = cliente?.status || "-";

        const nomeLower = nome.toLowerCase();

        clientesDiv.innerHTML += `
          <div class="card cardCliente" data-nome="${nomeLower}">

            <h2>${nome}</h2>

            <p><strong>Empresa:</strong> ${empresa}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Status:</strong> ${status}</p>

            <button class="btn-abrir" onclick="abrirCliente('${docItem.id}')">
              Abrir Cliente
            </button>

            <button
              onclick="excluirCliente('${docItem.id}', '${nome}')"
              style="
                width:100%;
                margin-top:10px;
                background:#a83232;
                color:white;
                border:none;
                padding:12px;
                border-radius:10px;
              "
            >
              🗑 Excluir Cliente
            </button>

          </div>
        `;
      });
    }
  );
}

/* 🔓 LOGOUT */
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "login.html";
});

/* 🔥 ABRIR CLIENTE */
window.abrirCliente = function(id){
  window.location.href = `cliente.html?id=${id}`;
};

/* 🔍 FILTRO */
window.filtrarClientes = function(){

  const termo = document.getElementById("pesquisaCliente").value.toLowerCase();

  document.querySelectorAll(".cardCliente").forEach(card => {

    const nome = card.dataset.nome || "";

    card.style.display = nome.includes(termo) ? "block" : "none";

  });

};

/* 🗑 EXCLUIR */
window.excluirCliente = async function(id, nome){

  const confirmar = confirm(`Deseja excluir o cliente "${nome}"?`);
  if(!confirmar) return;

  const check = prompt("Digite EXCLUIR para confirmar");
  if(check !== "EXCLUIR") return;

  await deleteDoc(doc(db, "clientes", id));

  alert("Cliente excluído com sucesso");

};

</script>

</body>
</html>
