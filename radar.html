<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Courvan</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#07162b;
      color:white;
      padding:40px;
    }

    h1{
      margin-bottom:30px;
      color:#d8a84e;
    }

    .topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      gap:20px;
      flex-wrap:wrap;
    }

    .status{
      background:#0c2748;
      padding:12px 18px;
      border-radius:12px;
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
      gap:20px;
    }

    .card{
      background:#0c2748;
      border-radius:20px;
      padding:25px;
      transition:0.3s;
      border:1px solid rgba(255,255,255,0.05);
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .orgao{
      color:#d8a84e;
      font-size:20px;
      margin-bottom:15px;
      font-weight:bold;
    }

    .cidade{
      margin-bottom:15px;
      opacity:0.85;
    }

    .objeto{
      line-height:1.5;
      margin-bottom:20px;
    }

    .info{
      margin-bottom:10px;
    }

    .valor{
      font-size:22px;
      color:#7dffae;
      margin-top:15px;
      margin-bottom:20px;
      font-weight:bold;
    }

    .btn{
      display:block;
      width:100%;
      text-align:center;
      background:#d8a84e;
      color:#07162b;
      padding:14px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .loading{
      font-size:18px;
      opacity:0.8;
    }

    @media(max-width:700px){

      body{
        padding:20px;
      }

    }

  </style>
</head>

<body>

  <div class="topo">

    <h1>📡 Radar Courvan</h1>

    <div class="status" id="status">
      Carregando oportunidades...
    </div>

  </div>

  <div class="grid" id="licitacoes"></div>

  <script>

    async function carregarLicitacoes(){

      try{

        const response = await fetch("./oportunidades.json");

        const dados = await response.json();

        const grid = document.getElementById("licitacoes");

        const status = document.getElementById("status");

        status.innerHTML =
          `${dados.length} oportunidade(s) encontrada(s)`;

        if(dados.length === 0){

          grid.innerHTML = `
            <div class="card">
              Nenhuma oportunidade encontrada.
            </div>
          `;

          return;

        }

        dados.forEach((item) => {

          grid.innerHTML += `

            <div class="card">

              <div class="orgao">
                ${item.orgao}
              </div>

              <div class="cidade">
                📍 ${item.cidade} - ${item.estado}
              </div>

              <div class="objeto">
                ${item.objeto}
              </div>

              <div class="info">
                <strong>Modalidade:</strong>
                ${item.modalidade}
              </div>

              <div class="info">
                <strong>Abertura:</strong>
                ${item.abertura || "Não informado"}
              </div>

              <div class="info">
                <strong>Encerramento:</strong>
                ${item.encerramento || "Não informado"}
              </div>

              <div class="valor">
                R$ ${Number(item.valor).toLocaleString("pt-BR")}
              </div>

              <a
                class="btn"
                href="${item.link}"
                target="_blank"
              >
                Abrir Licitação
              </a>

            </div>

          `;

        });

      }catch(error){

        console.log(error);

        document.getElementById("status").innerHTML =
          "Erro ao carregar oportunidades.";

      }

    }

    carregarLicitacoes();

  </script>

</body>
</html>
