<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Courvan</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

    body {
      background: radial-gradient(circle at top right, rgba(44, 82, 130, 0.08) 0%, #06101e 60%);
      color: #f3f4f6;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: linear-gradient(145deg, #0d233f 0%, #081729 100%);
      padding: 40px 30px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(255, 255, 255, 0.03);
      text-align: center;
    }

    .logo-login {
      height: 75px;
      width: auto;
      margin-bottom: 20px;
      filter: brightness(1.1);
    }

    h2 {
      margin-bottom: 25px;
      color: #ffffff;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .input-field {
      position: relative;
      width: 100%;
      margin-top: 14px;
    }

    .input-field i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 14px;
      transition: color 0.3s;
    }

    input {
      width: 100%;
      padding: 16px 16px 16px 42px;
      background: #06101e;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      color: white;
      font-size: 14px;
      transition: all 0.3s;
      /* Ajuste: permite que o texto role horizontalmente se for longo demais, mantendo o layout intacto */
      overflow: hidden;
    }

    input:focus {
      outline: none;
      border-color: #d8a84e;
      background: #0d233f;
      box-shadow: 0 0 0 3px rgba(216, 168, 78, 0.1);
    }

    input:focus + i { color: #d8a84e; }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 24px;
      background: linear-gradient(135deg, #e5b85c 0%, #d8a84e 100%);
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      color: #06101e;
      font-size: 14px;
    }

    button:hover {
      filter: brightness(1.05);
      box-shadow: 0 8px 20px rgba(216, 168, 78, 0.2);
    }

    .back-site {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 25px;
      color: #64748b;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s;
    }

    .back-site:hover { color: #f3d082; }
  </style>
</head>

<body>

<div class="box">
  <img src="assets/logo.png" alt="Courvan" class="logo-login">
  <h2>Área do Cliente</h2>

  <div class="input-field">
    <input type="email" id="email" placeholder="Email">
    <i class="fas fa-envelope"></i>
  </div>

  <div class="input-field">
    <input type="password" id="senha" placeholder="Senha">
    <i class="fas fa-lock"></i>
  </div>

  <button onclick="login()">Entrar</button>

  <a href="index.html" class="back-site">
    <i class="fas fa-arrow-left"></i> Voltar para o site
  </a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoBoaz6huE9gfAtBR4qf1ItMWzSwCEvLs",
  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema",
  storageBucket: "courvan-sistema.firebasestorage.app",
  messagingSenderId: "729755072978",
  appId: "1:729755072978:web:e76e98fd704c10da34f00b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function(){
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if(!email || !senha){
    alert("Preencha email e senha");
    return;
  }

  try {
    await setPersistence(auth, browserLocalPersistence);
    const cred = await signInWithEmailAndPassword(auth, email, senha);
    window.location.href = (cred.user.email === "comercial.courvanlicitacoes@gmail.com") ? "clientes.html" : "cliente.html";
  } catch(error) {
    alert("Email ou senha incorretos.");
  }
}
</script>

</body>
</html>
