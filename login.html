<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Courvan</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* Estilos customizados para manter o padrão estético da Landing Page */
    .gradient-text {
      background: linear-gradient(135deg, #d8a84e 0%, #f0d080 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .gradient-btn {
      background: linear-gradient(135deg, #d8a84e 0%, #f0d080 100%);
    }
  </style>
</head>

<body class="bg-slate-950 text-white min-h-screen flex flex-col justify-center items-center p-4" style="background: linear-gradient(135deg, #07162b 0%, #05101f 100%);">

  <div class="w-full max-w-sm bg-[#0c2748] rounded-2xl p-8 border border-white/5 shadow-2xl text-center">
    
    <div class="mb-6 flex justify-center">
      <img src="assets/logo.png" alt="Courvan Logo" class="h-20 w-auto filter brightness-110 drop-shadow-lg">
    </div>

    <h2 class="text-2xl font-bold mb-8 gradient-text tracking-wide">Área do Cliente</h2>

    <div class="space-y-4">
      
      <div class="relative text-left">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
          <i class="fas fa-envelope"></i>
        </span>
        <input 
          type="email" 
          id="email" 
          placeholder="E-mail" 
          required
          class="w-full bg-[#07162b] text-white placeholder-gray-500 pl-11 pr-4 py-3.5 rounded-xl border border-white/10 focus:outline-none focus:border-[#d8a84e] focus:ring-2 focus:ring-[#d8a84e]/20 transition-all text-base"
        >
      </div>

      <div class="relative text-left">
        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
          <i class="fas fa-lock"></i>
        </span>
        <input 
          type="password" 
          id="senha" 
          placeholder="Senha" 
          required
          class="w-full bg-[#07162b] text-white placeholder-gray-500 pl-11 pr-4 py-3.5 rounded-xl border border-white/10 focus:outline-none focus:border-[#d8a84e] focus:ring-2 focus:ring-[#d8a84e]/20 transition-all text-base"
        >
      </div>

      <button 
        type="button" 
        onclick="window.login()" 
        class="w-full gradient-btn text-[#07162b] font-bold text-base py-3.5 rounded-xl shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all flex justify-center items-center gap-2 mt-2"
      >
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>

    </div>
