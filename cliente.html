<script type="module">

const firebaseConfig = {

  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema",
  storageBucket: "courvan-sistema.appspot.com",
  messagingSenderId: "729755072978",
  appId: "1:729755072978:web:e76e98fd704c10da34f00b"
};

let chartPizza = null;
let chartBar = null;
  
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

emailjs.init("yg2qGBBvZjUbHwU_y");
    
window.criarLicitacao = async function () {

  const orgao = document.getElementById("orgao").value;
  const objeto = document.getElementById("objeto").value;
  const valorRaw = document.getElementById("valor").value;

const valor = parseFloat(valorRaw || "0") || 0;
  const dataSessao = document.getElementById("dataSessao").value;
  const linkEdital = document.getElementById("linkEdital").value;

  if (!orgao || !objeto) {
    alert("Preencha órgão e objeto");
    return;
  }

  await addDoc(collection(db, "licitacoes"), {
    clienteId: clienteIdGlobal,
    orgao,
    objeto,
    valor,
    dataSessao,
    linkEdital,
    status: "aviso",
   
    data: serverTimestamp()
  });

  document.getElementById("orgao").value = "";
  document.getElementById("objeto").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("dataSessao").value = "";
  document.getElementById("linkEdital").value = "";

  listarLicitacoes();
};
  
/* =========================
   ESTADO GLOBAL (IMPORTANTE)
========================= */
let clienteIdGlobal = null;

window.abrirAgenda = function () {

  if (!clienteIdGlobal) {
    alert("Cliente ainda não carregado. Aguarde alguns segundos.");
    return;
  }

  window.location.href = "cliente.html?id=" + clienteIdGlobal;

};
  
let unsubscribeLicitacoes = null;
  
let modoAdmin = false;
  
let emailClienteGlobal = "";
  
function listarLicitacoes() {

  const filtroMes = document.getElementById("filtroMes")?.value;

  const div = document.getElementById("listaLicitacoes");

  const q = query(
    collection(db, "licitacoes"),
    where("clienteId", "==", clienteIdGlobal)
  );

  if (unsubscribeLicitacoes) {
  unsubscribeLicitacoes();
}

unsubscribeLicitacoes = onSnapshot(q, (snapshot) => {

    atualizarDashboard(snapshot);

    div.innerHTML = `

  <h2 style="margin-bottom:15px;color:#d8a84e;">
    📢 Avisos de Licitação
  </h2>
  <div id="grupo-aviso"></div>

  <h2 style="margin:30px 0 15px;color:#d8a84e;">
    🟡 Em Andamento
  </h2>
  <div id="grupo-andamento"></div>

  <h2 style="margin:30px 0 15px;color:#d8a84e;">
    🟢 Vencidas
  </h2>
  <div id="grupo-vencida"></div>

  <h2 style="margin:30px 0 15px;color:#d8a84e;">
    🔴 Perdidas
  </h2>
  <div id="grupo-perdida"></div>

  <h2 style="margin:30px 0 15px;color:#d8a84e;">
    ⚫ Descartadas
  </h2>
  <div id="grupo-descartada"></div>

`;

    snapshot.forEach((docItem) => {

  const l = docItem.data();

  if (filtroMes !== "") {

    const data = new Date(l.dataSessao);

    if (data.getMonth().toString() !== filtroMes) {
      return;
    }
  }

  const grupo = document.getElementById(
  `grupo-${l.status || "aviso"}`
);

grupo.innerHTML += `
        <div style="background:#16385f;padding:20px;border-radius:14px;margin-bottom:15px;">

          <h3 style="color:#d8a84e;">${l.orgao}</h3>

          <p><strong>Objeto:</strong> ${l.objeto}</p>
          <p><strong>Valor:</strong> ${l.valor}</p>
          <p><strong>Data Sessão:</strong> ${l.dataSessao}</p>

          ${l.linkEdital ? `
            <a href="${l.linkEdital}" target="_blank"
              style="display:inline-block;margin-top:10px;background:#d8a84e;color:#07162b;padding:10px 15px;border-radius:10px;text-decoration:none;">
              Abrir Edital
            </a>
          ` : ""}

          <select
  onchange="alterarStatusLicitacao('${docItem.id}', this.value)"
  style="
    margin-top:15px;
    padding:10px;
    border:none;
    border-radius:8px;
    width:100%;
  "
>

  <option
    value="aviso"
    ${l.status === "aviso" ? "selected" : ""}
  >
    📢 Aviso
  </option>

  <option
    value="andamento"
    ${l.status === "andamento" ? "selected" : ""}
  >
    🟡 Em andamento
  </option>

  <option
    value="vencida"
    ${l.status === "vencida" ? "selected" : ""}
  >
    🟢 Vencida
  </option>

  <option
    value="perdida"
    ${l.status === "perdida" ? "selected" : ""}
  >
    🔴 Perdida
  </option>

  <option
    value="descartada"
    ${l.status === "descartada" ? "selected" : ""}
  >
    ⚫ Descartadas
  </option>

</select>

<button
  onclick="excluirLicitacao('${docItem.id}')"
  style="
    margin-top:12px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#a83232;
    color:white;
    cursor:pointer;
    font-weight:bold;
  "
>
  🗑 Excluir Licitação
</button>

        </div>
      `;
    });

  });

}

  window.alterarStatusLicitacao = async function(id, status){

  await updateDoc(
    doc(db, "licitacoes", id),
    {
      status
    }
  );

};

window.excluirLicitacao = async function(id){

  const confirmar = confirm(
    "Deseja excluir esta licitação?"
  );

  if(!confirmar) return;

  await deleteDoc(
    doc(db, "licitacoes", id)
  );

};
  
/* =========================
   LOGIN + BUSCAR CLIENTE
========================= */
/* =========================
   LOGIN + BUSCAR CLIENTE
========================= */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // 🔥 verifica se veio ID pela URL
  const params = new URLSearchParams(window.location.search);

  const clienteIdUrl = params.get("id");

  // =========================
  // MODO ADMIN
  // =========================
  if (clienteIdUrl) {

    modoAdmin = true;

    // 🔥 mostra área admin documentos
document.getElementById(
  "formDocumentos"
).style.display = "flex";

    const q = query(
      collection(db, "clientes")
    );

    const snap = await getDocs(q);

    let clienteEncontrado = null;

    snap.forEach((docItem) => {

      if(docItem.id === clienteIdUrl){

        clienteEncontrado = {
          id: docItem.id,
          ...docItem.data()
        };

      }

    });

    if(!clienteEncontrado){
      alert("Cliente não encontrado");
      return;
    }

    clienteIdGlobal = clienteEncontrado.id;

    emailClienteGlobal = clienteEncontrado.email;

    document.getElementById("nome").innerText = clienteEncontrado.nome;
    document.getElementById("nomeCliente").innerText = clienteEncontrado.nome;
    document.getElementById("empresa").innerText = clienteEncontrado.empresa;
    document.getElementById("email").innerText = clienteEncontrado.email;
    document.getElementById("status").innerText = clienteEncontrado.status;

    listarDemandas();

    iniciarDocumentos();

    iniciarChat();

    listarLicitacoes();

    return;
  }

  // =========================
  // MODO CLIENTE
  // =========================
  const q = query(
    collection(db, "clientes"),
    where("uid", "==", user.uid)
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    alert("Nenhum cliente vinculado a este usuário");
    return;
  }

  const docCliente = snap.docs[0];

  modoAdmin = false;

  const cliente = docCliente.data();

  clienteIdGlobal = docCliente.id;

  document.getElementById("nome").innerText = cliente.nome;
  document.getElementById("nomeCliente").innerText = cliente.nome;
  document.getElementById("empresa").innerText = cliente.empresa;
  document.getElementById("email").innerText = cliente.email;
  emailClienteGlobal = cliente.email;
  document.getElementById("status").innerText = cliente.status;

  listarDemandas();

  iniciarDocumentos();

  iniciarChat();

  listarLicitacoes();

});

/* =========================
   CRIAR DEMANDA
========================= */
window.criarDemanda = async function () {

  const titulo = document.getElementById("titulo").value;
  const descricao = document.getElementById("descricao").value;
  const prazo = document.getElementById("prazo").value;
  const prioridade = document.getElementById("prioridade").value;

  if (!titulo) {
    alert("Digite um título");
    return;
  }

  await addDoc(collection(db, "demandas"), {
    clienteId: clienteIdGlobal,
    titulo,
    descricao,
    prazo,
    prioridade,
    status: "pendente"
  });

  document.getElementById("titulo").value = "";
  document.getElementById("descricao").value = "";

  listarDemandas();
};

/* =========================
   LISTAR DEMANDAS
========================= */
async function listarDemandas() {

  const q = query(
    collection(db, "demandas"),

    const d = docItem.data();

    div.innerHTML += `

        <h3 style="color:#d8a84e;">${d.titulo}</h3>
        <p>${d.descricao}</p>
        <p><strong>Prazo:</strong> ${d.prazo}</p>
        <p><strong>Prioridade:</strong> ${d.prioridade}</p>

  style="

    margin-right:10px;
    background:#1d4b7d;
    color:white;
  "
>
  💬 Comentários
</button>

<button
  onclick="excluirDemanda('${docItem.id}')"
  style="
    margin-top:12px;
    background:#a83232;
    color:white;
  "
>
  🗑 Excluir
</button>

<div
  id="comentarios-${docItem.id}"
  style="
    margin-top:20px;
    display:none;
    background:#102847;
    padding:15px;
    border-radius:12px;
  "
>

  <div
    id="lista-comentarios-${docItem.id}"
    style="
      max-height:250px;
      overflow-y:auto;
      margin-bottom:15px;
    "
  ></div>

  <div style="display:flex;gap:10px;">

    <input
      type="text"
      id="input-comentario-${docItem.id}"
      placeholder="Digite um comentário..."
      style="
        flex:1;
        padding:10px;
        border:none;
        border-radius:8px;
      "
    >

    <button
      onclick="enviarComentario('${docItem.id}')"
    >
      Enviar
    </button>

  </div>

</div>

        <select onchange="alterarStatus('${docItem.id}', this.value)"

async function rankingClientes() {

  const snap = await getDocs(collection(db, "licitacoes"));

  const ranking = {};

  snap.forEach(doc => {

    const l = doc.data();

    const cliente = l.clienteId;

    if (!ranking[cliente]) {
      ranking[cliente] = {
        total: 0,
        vencidas: 0
      };
    }

    ranking[cliente].total++;

    if (l.status === "vencida") {
      ranking[cliente].vencidas++;
    }

  });

  console.log("Ranking de clientes:", ranking);
}

function atualizarDashboard(snapshot){

  let total = 0;
  let andamento = 0;
  let vencidas = 0;
  let perdidas = 0;
  let valorTotal = 0;

  let proximas = [];

  snapshot.forEach(docItem => {

    const l = docItem.data();

    total++;

    const valor = parseFloat(l.valor || 0);
    valorTotal += valor;

    if(l.status === "andamento") andamento++;
    if(l.status === "vencida") vencidas++;
    if(l.status === "perdida") perdidas++;

    if(l.dataSessao){
      proximas.push(l);
    }

  });

  // KPIs
  document.getElementById("kpiTotal").innerText = total;
  document.getElementById("kpiAndamento").innerText = andamento;
  document.getElementById("kpiVencidas").innerText = vencidas;
  document.getElementById("kpiPerdidas").innerText = perdidas;
  document.getElementById("kpiValor").innerText =
    "R$ " + valorTotal.toLocaleString("pt-BR");

  const taxa = total ? ((vencidas / total) * 100).toFixed(1) : 0;
  document.getElementById("kpiTaxa").innerText = taxa + "%";

  // próximas licitações
  const div = document.getElementById("proximas");
  div.innerHTML = "";

  proximas.slice(0,5).forEach(l => {

    div.innerHTML += `
      <div style="padding:10px;border-bottom:1px solid #1d4b7d;">
        <strong>${l.orgao}</strong> - ${l.objeto}<br>
        <small>${l.dataSessao}</small>
      </div>
    `;

  });

  // GRÁFICO PIZZA
  try {
  if (chartPizza) chartPizza.destroy();
} catch(e){}

chartPizza = new Chart(document.getElementById("chartPizza"), {
    type: "pie",
    data: {
      labels: ["Andamento", "Vencidas", "Perdidas"],
      datasets: [{
        data: [andamento, vencidas, perdidas]
      }]
    }
  });

  // GRÁFICO BARRAS
  try {
  if (chartBar) chartBar.destroy();
} catch(e){}

chartBar = new Chart(document.getElementById("chartBar"), {
    type: "bar",
    data: {
      labels: ["Total", "Andamento", "Vencidas", "Perdidas"],
      datasets: [{
        data: [total, andamento, vencidas, perdidas]
      }]
    }
  });

}
