onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // 🔥 verifica se veio ID pela URL
  const params = new URLSearchParams(window.location.search);

  const clienteIdUrl = params.get("id");

  // =========================
  // MODO ADMIN
  // =========================
  if (clienteIdUrl) {

    // 🔥 mostra área admin documentos
document.getElementById(
  "formDocumentos"
).style.display = "flex";

    const q = query(
      collection(db, "clientes")
    );

    const snap = await getDocs(q);

    let clienteEncontrado = null;

    snap.forEach((docItem) => {

      if(docItem.id === clienteIdUrl){

        clienteEncontrado = {
          id: docItem.id,
          ...docItem.data()
        };

      }

    });

    if(!clienteEncontrado){
      alert("Cliente não encontrado");
      return;
    }

    clienteIdGlobal = clienteEncontrado.id;

    emailClienteGlobal = clienteEncontrado.email;

    document.getElementById("nome").innerText = clienteEncontrado.nome;
    document.getElementById("nomeCliente").innerText = clienteEncontrado.nome;
    document.getElementById("empresa").innerText = clienteEncontrado.empresa;
    document.getElementById("email").innerText = clienteEncontrado.email;
    document.getElementById("status").innerText = clienteEncontrado.status;

    listarDemandas();

    iniciarDocumentos();

    iniciarChat();

    listarLicitacoes();

    return;
  }

  // =========================
  // MODO CLIENTE
  // =========================
  const q = query(
    collection(db, "clientes"),
    where("uid", "==", user.uid)
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    alert("Nenhum cliente vinculado a este usuário");
    return;
  }

  const docCliente = snap.docs[0];

  const cliente = docCliente.data();

segmentosClienteGlobal = (cliente.segmentos || "").toLowerCase();
  
  clienteIdGlobal = docCliente.id;

  document.getElementById("nome").innerText = cliente.nome;
  document.getElementById("nomeCliente").innerText = cliente.nome;
  document.getElementById("empresa").innerText = cliente.empresa;
  document.getElementById("email").innerText = cliente.email;
  emailClienteGlobal = cliente.email;
  document.getElementById("status").innerText = cliente.status;

document.getElementById("configSegmentos").value =
  cliente.segmentos || "";

document.getElementById("configCidades").value =
(cliente.cidadesFiltro || []).join(", ");

document.getElementById("configEstados").value =
(cliente.estadosFiltro || []).join(", ");

document.getElementById("configOrgaos").value =
(cliente.orgaosFiltro || []).join(", ");
  
  listarDemandas();

  iniciarDocumentos();

  iniciarChat();

  listarLicitacoes();

});

   LISTENER COMENTÁRIOS
========================= */
function iniciarComentarios(demandaId){

  const div = document.getElementById(
    `lista-comentarios-${demandaId}`
  );

  const q = query(

    collection(
      db,
      "demandas",
      demandaId,
      "comentarios"
    ),

    orderBy("data")

  );

  onSnapshot(q, (snapshot)=>{

    div.innerHTML = "";

    snapshot.forEach((docItem)=>{

      const c = docItem.data();

      const dataFormatada = c.data
        ? new Date(
            c.data.seconds * 1000
          ).toLocaleString("pt-BR")
        : "";

      div.innerHTML += `

        <div style="
          background:#16385f;
          padding:12px;
          border-radius:10px;
          margin-bottom:10px;
        ">

          <strong>${c.nome}</strong>

            margin-bottom:8px;

            margin-bottom:8px;
          ">

          </div>

          <div style="
            font-size:11px;
            opacity:0.7;
          ">
            ${dataFormatada}
          </div>

        </div>

      `;

    });

  });

}

   ENTER NOS COMENTÁRIOS
========================= */
document.addEventListener("keydown", (e) => {

  if (e.key !== "Enter") return;

  const ativo = document.activeElement;

  if (
    ativo &&
    ativo.id &&
    ativo.id.startsWith("input-comentario-")
  ) {

    e.preventDefault();

    const demandaId =
      ativo.id.replace(
        "input-comentario-",
        ""
      );

    enviarComentario(demandaId);

  }

});

========================= */
window.adicionarDocumento = async function () {

  const nome =
    document.getElementById("nomeDocumento").value;

  const link =
    document.getElementById("linkDocumento").value;

  if (!nome || !link) {

    alert("Preencha todos os campos");
    return;

  }

  if(
  !link.startsWith("http://") &&
  !link.startsWith("https://")
){
  alert("Cole o link completo do Google Drive");
  return;
}

  try {

    await addDoc(

      collection(db, "documentos"),

      {
        clienteId: clienteIdGlobal,
        nome,
        link,
        data: serverTimestamp()
      }

    );

    alert("Documento adicionado!");

    document.getElementById("nomeDocumento").value = "";
    document.getElementById("linkDocumento").value = "";

  } catch(error){

    console.log(error);

    alert("Erro ao adicionar documento");

  }

};

/* =========================
   LISTAR DOCUMENTOS
========================= */
function iniciarDocumentos(){

  const div =
    document.getElementById(
      "listaDocumentos"
    );

  const q = query(

  collection(db, "documentos"),

  where(
    "clienteId",
    "==",
    clienteIdGlobal
  )

);

  onSnapshot(q, (snapshot) => {

    div.innerHTML = "";

    snapshot.forEach((docItem) => {

      const d = docItem.data();

      let dataFormatada = "";

      if(d.data){

        dataFormatada =
          new Date(
            d.data.seconds * 1000
          ).toLocaleString("pt-BR");

      }

      div.innerHTML += `

        <div style="
          background:#16385f;
          padding:20px;
          border-radius:14px;
          margin-bottom:15px;
        ">

          <h3 style="
            color:#d8a84e;
            margin-bottom:10px;
          ">
            📄 ${d.nome}
          </h3>

          <p style="
            margin-bottom:15px;
            opacity:0.8;
          ">
            ${dataFormatada}
          </p>

          ${d.link ? `

  <a
    href="${d.link}"
    target="_blank"
    rel="noopener noreferrer"
    style="
      display:inline-block;
      background:#d8a84e;
      color:#07162b;
      padding:12px 18px;
      border-radius:10px;
      text-decoration:none;
      font-weight:bold;
    "
  >
    Abrir Documento
  </a>

` : `

  <p style="
    color:#ffb3b3;
    font-size:14px;
  ">
    Link indisponível
  </p>

`}

        </div>

      `;

    });

  });

}

window.alterarSenha = async function () {

  const user = auth.currentUser;

  if (!user || !user.email) {

    alert("Usuário não encontrado");
    return;

  }

  try {

    await sendPasswordResetEmail(
      auth,
      user.email
    );

    alert(
      "Email de redefinição enviado para: " +
      user.email
    );

  } catch (error) {

    console.log(error);

    alert("Erro ao enviar email");

  }

};

window.logout = async function () {

  const confirmar = confirm(
    "Deseja sair do sistema?"
  );

  if (!confirmar) return;

  try {

    await signOut(auth);

    window.location.href = "login.html";

  } catch (error) {

    console.log(error);

    alert("Erro ao sair");

  }

};
  
window.mostrarAba = function (id) {

  document.querySelectorAll(".aba").forEach(a => {
    a.style.display = "none";
  });

  document.getElementById(id).style.display = "block";

  if (id === "demandas") {
    listarDemandas();
  }

  if (id === "licitacoes") {
    listarLicitacoes();
  }

};
