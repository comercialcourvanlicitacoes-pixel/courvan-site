<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cliente - Courvan</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#07162b;
      color:white;
    }

    .layout{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:260px;
      background:#0c2748;
      padding:30px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .sidebar h2{
      color:#d8a84e;
      margin-bottom:20px;
    }

    .sidebar button{
      padding:14px;
      border:none;
      border-radius:10px;
      background:#16385f;
      color:white;
      cursor:pointer;
      text-align:left;
      transition:0.3s;
      font-size:15px;
    }

    .sidebar button:hover{
      background:#1d4b7d;
    }

    .content{
      flex:1;
      padding:40px;
    }

    .aba{
      background:#0c2748;
      padding:30px;
      border-radius:18px;
    }

    h1{
      color:#d8a84e;
      margin-bottom:20px;
    }

    p{
      margin-bottom:12px;
      line-height:1.6;
    }

    .info-box{
      margin-top:25px;
      background:#16385f;
      padding:20px;
      border-radius:14px;
    }

    .info-box p{
      margin-bottom:10px;
    }

    @media(max-width:900px){
      .layout{flex-direction:column;}
      .sidebar{width:100%;}
      .content{padding:20px;}
    }

  </style>
</head>

<body>

<div class="layout">

  <div class="sidebar">

    <h2 id="nomeCliente">Cliente</h2>

    <button onclick="mostrarAba('dashboard')">📊 Dashboard</button>
    <button onclick="mostrarAba('demandas')">📑 Demandas</button>
    <button onclick="mostrarAba('documentos')">📁 Documentos</button>
    <button onclick="mostrarAba('chat')">💬 Chat</button>
    <button onclick="mostrarAba('licitacoes')">🏛 Licitações</button>
    <button onclick="mostrarAba('config')">⚙ Configurações</button>

  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard" class="aba">

      <h1>Dashboard do Cliente</h1>

      <div class="info-box">
        <p><strong>Nome:</strong> <span id="nome"></span></p>
        <p><strong>Empresa:</strong> <span id="empresa"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>Status:</strong> <span id="status"></span></p>
      </div>

    </div>

    <!-- DEMANDAS -->
    <div id="demandas" class="aba" style="display:none;">

      <h1>Demandas</h1>

      <input type="text" id="titulo" placeholder="Título da demanda"><br><br>

      <textarea id="descricao" placeholder="Descrição"
        style="width:100%;height:120px;padding:15px;border-radius:10px;border:none;"></textarea>

      <br><br>

      <input type="date" id="prazo"><br><br>

      <select id="prioridade" style="padding:12px;border-radius:10px;border:none;">
        <option value="baixa">Baixa</option>
        <option value="media">Média</option>
        <option value="alta">Alta</option>
      </select>

      <br><br>

      <button onclick="criarDemanda()">Criar Demanda</button>

      <br><br><br>

      <div id="listaDemandas"></div>

    </div>

    <div id="documentos" class="aba" style="display:none;">
      <h1>Documentos</h1>
    </div>

    <div id="chat" class="aba" style="display:none;">

  <h1>Chat</h1>

  <!-- MENSAGENS -->
  <div id="mensagens" style="
    background:#16385f;
    height:400px;
    overflow-y:auto;
    padding:20px;
    border-radius:14px;
    margin-bottom:20px;
  ">
  </div>

  <!-- INPUT -->
  <div style="display:flex;gap:10px;">

    <input
      type="text"
      id="mensagemInput"
      placeholder="Digite sua mensagem..."
      style="
        flex:1;
        padding:14px;
        border:none;
        border-radius:10px;
      "
    >

    <button onclick="enviarMensagem()">
      Enviar
    </button>

  </div>

</div>

    <div id="licitacoes" class="aba" style="display:none;">
      <h1>Licitações</h1>
    </div>

    <div id="config" class="aba" style="display:none;">
      <h1>Configurações</h1>
    </div>

  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  addDoc,
  doc,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoBoaz6huE9gfAtBR4qf1ItMWzSwCEvLs",
  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema",
  storageBucket: "courvan-sistema.appspot.com",
  messagingSenderId: "729755072978",
  appId: "1:729755072978:web:e76e98fd704c10da34f00b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* =========================
   ESTADO GLOBAL (IMPORTANTE)
========================= */
let clienteIdGlobal = null;

/* =========================
   LOGIN + BUSCAR CLIENTE
========================= */
/* =========================
   LOGIN + BUSCAR CLIENTE
========================= */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // 🔥 verifica se veio ID pela URL
  const params = new URLSearchParams(window.location.search);

  const clienteIdUrl = params.get("id");

  // =========================
  // MODO ADMIN
  // =========================
  if (clienteIdUrl) {

    const q = query(
      collection(db, "clientes")
    );

    const snap = await getDocs(q);

    let clienteEncontrado = null;

    snap.forEach((docItem) => {

      if(docItem.id === clienteIdUrl){

        clienteEncontrado = {
          id: docItem.id,
          ...docItem.data()
        };

      }

    });

    if(!clienteEncontrado){
      alert("Cliente não encontrado");
      return;
    }

    clienteIdGlobal = clienteEncontrado.id;

    document.getElementById("nome").innerText = clienteEncontrado.nome;
    document.getElementById("nomeCliente").innerText = clienteEncontrado.nome;
    document.getElementById("empresa").innerText = clienteEncontrado.empresa;
    document.getElementById("email").innerText = clienteEncontrado.email;
    document.getElementById("status").innerText = clienteEncontrado.status;

    listarDemandas();

    iniciarChat();

    return;
  }

  // =========================
  // MODO CLIENTE
  // =========================
  const q = query(
    collection(db, "clientes"),
    where("uid", "==", user.uid)
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    alert("Nenhum cliente vinculado a este usuário");
    return;
  }

  const docCliente = snap.docs[0];

  const cliente = docCliente.data();

  clienteIdGlobal = docCliente.id;

  document.getElementById("nome").innerText = cliente.nome;
  document.getElementById("nomeCliente").innerText = cliente.nome;
  document.getElementById("empresa").innerText = cliente.empresa;
  document.getElementById("email").innerText = cliente.email;
  document.getElementById("status").innerText = cliente.status;

  listarDemandas();

  iniciarChat();

});

/* =========================
   CRIAR DEMANDA
========================= */
window.criarDemanda = async function () {

  const titulo = document.getElementById("titulo").value;
  const descricao = document.getElementById("descricao").value;
  const prazo = document.getElementById("prazo").value;
  const prioridade = document.getElementById("prioridade").value;

  if (!titulo) {
    alert("Digite um título");
    return;
  }

  await addDoc(collection(db, "demandas"), {
    clienteId: clienteIdGlobal,
    titulo,
    descricao,
    prazo,
    prioridade,
    status: "pendente"
  });

  document.getElementById("titulo").value = "";
  document.getElementById("descricao").value = "";

  listarDemandas();
};

/* =========================
   LISTAR DEMANDAS
========================= */
async function listarDemandas() {

  if (!clienteIdGlobal) return;

  const q = query(
    collection(db, "demandas"),
    where("clienteId", "==", clienteIdGlobal)
  );

  const snap = await getDocs(q);

  const div = document.getElementById("listaDemandas");
  div.innerHTML = "";

  snap.forEach((docItem) => {

    const d = docItem.data();

    div.innerHTML += `
      <div style="background:#16385f;padding:20px;border-radius:14px;margin-bottom:15px;">
        <h3 style="color:#d8a84e;">${d.titulo}</h3>
        <p>${d.descricao}</p>
        <p><strong>Prazo:</strong> ${d.prazo}</p>
        <p><strong>Prioridade:</strong> ${d.prioridade}</p>

        <select onchange="alterarStatus('${docItem.id}', this.value)"
          style="padding:8px;border-radius:8px;border:none;margin-top:10px;">
          <option value="pendente" ${d.status === "pendente" ? "selected" : ""}>Pendente</option>
          <option value="andamento" ${d.status === "andamento" ? "selected" : ""}>Em andamento</option>
          <option value="concluido" ${d.status === "concluido" ? "selected" : ""}>Concluído</option>
        </select>
      </div>
    `;
  });
}

/* =========================
   TROCAR ABA
========================= */

  /* =========================
   ENVIAR MENSAGEM
========================= */

  /* =========================
   ENTER PARA ENVIAR
========================= */
document
  .getElementById("mensagemInput")
  .addEventListener("keypress", function(e){

    if(e.key === "Enter"){

      e.preventDefault();

      enviarMensagem();

    }

});
  
window.enviarMensagem = async function () {

  const input = document.getElementById("mensagemInput");

  const texto = input.value;

  if (!texto) return;

  const user = auth.currentUser;

  let autor = "cliente";

  // 🔥 identifica admin
  if(user.email === "comercial.courvanlicitacoes@gmail.com"){
    autor = "admin";
  }

  await addDoc(

    collection(
      db,
      "chats",
      clienteIdGlobal,
      "mensagens"
    ),

    {
  texto,
  autor,

  nome:
    user.email === "comercial.courvanlicitacoes@gmail.com"
      ? "Equipe Courvan"
      : document.getElementById("nome").innerText,

  empresa:
    user.email === "comercial.courvanlicitacoes@gmail.com"
      ? "Courvan"
      : document.getElementById("empresa").innerText,

  data: serverTimestamp()
}

  );

  input.value = "";

};

/* =========================
   LISTENER TEMPO REAL
========================= */
function iniciarChat(){

  const mensagensDiv =
    document.getElementById("mensagens");

  const q = query(

    collection(
      db,
      "chats",
      clienteIdGlobal,
      "mensagens"
    ),

    orderBy("data")

  );

  onSnapshot(q, (snapshot) => {

    mensagensDiv.innerHTML = "";

    snapshot.forEach((docItem) => {

      const msg = docItem.data();

      const alinhamento =
        msg.autor === "admin"
        ? "right"
        : "left";

      const cor =
        msg.autor === "admin"
        ? "#d8a84e"
        : "#1d4b7d";

      const dataFormatada = msg.data
  ? new Date(msg.data.seconds * 1000).toLocaleString("pt-BR")
  : "";

mensagensDiv.innerHTML += `

  <div style="
    text-align:${alinhamento};
    margin-bottom:15px;
  ">

    <div style="
      display:inline-block;
      background:${cor};
      color:white;
      padding:12px 16px;
      border-radius:14px;
      max-width:70%;
    ">

      <div style="
        font-size:12px;
        opacity:0.8;
        margin-bottom:6px;
      ">

        <strong>
  ${msg.nome || "Usuário"}
</strong>

<div style="
  font-size:11px;
  opacity:0.7;
  margin-top:2px;
">
  ${msg.empresa || ""}
</div>

      </div>

      <div style="
        margin-bottom:8px;
      ">
        ${msg.texto}
      </div>

      <div style="
        font-size:11px;
        opacity:0.7;
      ">
        ${dataFormatada}
      </div>

    </div>

  </div>

`;
    });

    // 🔥 scroll automático
    mensagensDiv.scrollTop =
      mensagensDiv.scrollHeight;

  });

}
  
window.mostrarAba = function (id) {

  document.querySelectorAll(".aba").forEach(a => {
    a.style.display = "none";
  });

  document.getElementById(id).style.display = "block";

  if (id === "demandas") {
    listarDemandas();
  }
};

</script>

</body>
</html>
