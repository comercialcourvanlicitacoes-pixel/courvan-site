<script type="module">

// =========================
// FIREBASE IMPORTS
// =========================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


// =========================
// CONFIG FIREBASE
// =========================
const firebaseConfig = {
  apiKey: "AIzaSyBoBoaz6huE9gfAtBR4qf1ItMWzSwCEvLs",
  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema",
  storageBucket: "courvan-sistema.appspot.com",
  messagingSenderId: "729755072978",
  appId: "1:729755072978:web:e76e98fd704c10da34f00b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);


// =========================
// LOGIN CHECK
// =========================
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  iniciarCalendario();

});


// =========================
// COR STATUS
// =========================
function corStatus(status){

  switch(status){

    case "aviso": return "#1d4b7d";
    case "andamento": return "#d8a84e";
    case "vencida": return "#2ecc71";
    case "perdida": return "#e74c3c";
    case "descartada": return "#2c3e50";
    default: return "#999";

  }

}


// =========================
// CALENDÁRIO
// =========================
function iniciarCalendario() {

  const calendarEl = document.getElementById('calendar');

  const calendar = new FullCalendar.Calendar(calendarEl, {

    initialView: 'dayGridMonth',
    locale: 'pt-br',

    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,listWeek'
    },

    events: async function(fetchInfo, successCallback) {

      try {

        const snapshot = await getDocs(collection(db, "licitacoes"));

        const eventos = [];

        snapshot.forEach((docItem) => {

          const l = docItem.data();

          if (!l.dataSessao) return;

          eventos.push({

            id: docItem.id,
            title: `${l.orgao || "Sem órgão"} - ${l.objeto || ""}`,

            start: l.dataSessao?.includes("/")
              ? l.dataSessao.split("/").reverse().join("-")
              : l.dataSessao,

            color: corStatus(l.status),

            extendedProps: {
              cliente: l.clienteId || "",
              valor: l.valor || "",
              status: l.status || "",
              orgao: l.orgao || "",
              objeto: l.objeto || "",
              linkEdital: l.linkEdital || ""
            }

          });

        });

        console.log("EVENTOS CARREGADOS:", eventos);

        successCallback(eventos);

      } catch (error) {

        console.error("Erro calendário:", error);
        successCallback([]);

      }

    },

    eventClick: function(info) {

      const p = info.event.extendedProps;

      alert(
        "📌 Licitação\n\n" +
        "Órgão: " + p.orgao + "\n" +
        "Objeto: " + p.objeto + "\n" +
        "Status: " + p.status + "\n" +
        "Cliente ID: " + p.cliente + "\n" +
        "Valor: " + p.valor + "\n" +
        "Link: " + (p.linkEdital || "N/A")
      );

    }

  });

  calendar.render();

}

</script>
