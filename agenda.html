<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Agenda de Licitações</title>

<link
  href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#07162b;
  color:white;
  min-height:100vh;
  padding:20px;
}

h2{
  text-align:center;
  color:#d8a84e;
  margin-bottom:20px;
}

/* CALENDÁRIO */
#calendar-container{
  width:100%;
  max-width:1400px;
  margin:0 auto;
}

#calendar{
  background:#0c2748;
  padding:20px;
  border-radius:18px;
  min-height:78vh;
}

/* FULLCALENDAR */
.fc{
  height:100%;
}

.fc-toolbar-title{
  color:white;
  font-size:22px !important;
}

.fc-button{
  background:#16385f !important;
  border:none !important;
}

.fc-button-active{
  background:#d8a84e !important;
  color:#07162b !important;
}

.fc-daygrid-day{
  background:#102847;
}

.fc-col-header-cell{
  background:#16385f;
}

.fc-scrollgrid{
  border:none !important;
}

.fc-theme-standard td,
.fc-theme-standard th{
  border-color:#1c4169 !important;
}

.fc-event{
  border:none !important;
  padding:3px;
  border-radius:6px;
  font-size:12px;
}

/* DRAWER */
#drawerOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:999;
}

#drawer{
  position:fixed;
  right:-420px;
  top:0;
  width:400px;
  max-width:100%;
  height:100%;
  background:#0c2748;
  padding:25px;
  transition:0.3s;
  z-index:1000;
  overflow-y:auto;
}

#drawer.open{
  right:0;
}

#drawerOverlay.show{
  display:block;
}

.drawer-title{
  color:#d8a84e;
  font-size:22px;
  margin-bottom:25px;
}

.item{
  margin-bottom:14px;
  line-height:1.5;
}

.btn-fechar{
  margin-top:30px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#d8a84e;
  color:#07162b;
  font-weight:bold;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){

  body{
    padding:10px;
  }

  #calendar{
    padding:10px;
    min-height:85vh;
  }

  .fc-toolbar{
    flex-direction:column;
    gap:10px;
  }

  .fc-toolbar-title{
    font-size:18px !important;
  }

  #drawer{
    width:100%;
  }

}

</style>
</head>

<body>

<h2>📅 Agenda de Licitações</h2>

<div id="calendar-container">
  <div id="calendar"></div>
</div>

<div
  id="drawerOverlay"
  onclick="fecharDrawer()"
></div>

<div id="drawer">

  <div class="drawer-title">
    📌 Licitação
  </div>

  <div id="drawerContent"></div>

  <button
    class="btn-fechar"
    onclick="fecharDrawer()"
  >
    Fechar
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script type="module">

import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoBoaz6huE9gfAtBR4qf1ItMWzSwCEvLs",
  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

await setPersistence(
  auth,
  browserLocalPersistence
);

/* =========================
   STATUS COLOR
========================= */
function corStatus(status){

  const s = (status || "")
    .toLowerCase()
    .trim();

  switch(s){

    case "andamento":
      return "#d8a84e";

    case "vencida":
      return "#2ecc71";

    case "perdida":
      return "#e74c3c";

    default:
      return "#999";
  }

}

/* =========================
   DRAWER
========================= */
window.abrirDrawer = function(html){

  document.getElementById(
    "drawerContent"
  ).innerHTML = html;

  document
    .getElementById("drawer")
    .classList.add("open");

  document
    .getElementById("drawerOverlay")
    .classList.add("show");

  document.body.style.overflow = "hidden";

};

window.fecharDrawer = function(){

  document
    .getElementById("drawer")
    .classList.remove("open");

  document
    .getElementById("drawerOverlay")
    .classList.remove("show");

  document.body.style.overflow = "auto";

};

/* =========================
   LOGIN
========================= */
onAuthStateChanged(auth, async (user)=>{

  if(!user){

    window.location.href =
      "login.html";

    return;

  }

  let clienteId = null;

  // ADMIN
  if(
    user.email !==
    "comercial.courvanlicitacoes@gmail.com"
  ){

    const snap = await getDocs(

      query(
        collection(db, "clientes"),
        where("uid", "==", user.uid)
      )

    );

    if(snap.empty) return;

    clienteId = snap.docs[0].id;

  }

  iniciarCalendario(clienteId);

});

/* =========================
   CALENDÁRIO
========================= */
async function iniciarCalendario(clienteId){

  const calendarEl =
    document.getElementById(
      "calendar"
    );

  // CLIENTES
  const clientesSnap =
    await getDocs(
      collection(db, "clientes")
    );

  const clientesMap = {};

  clientesSnap.forEach(c=>{

    clientesMap[c.id] =
      c.data().nome;

  });

  // QUERY
  let q;

  if(!clienteId){

    // ADMIN
    q = query(
      collection(db, "licitacoes"),
      where(
        "status",
        "in",
        [
          "andamento",
          "vencida",
          "perdida"
        ]
      )
    );

  }else{

    // CLIENTE
    q = query(

      collection(db, "licitacoes"),

      where(
        "clienteId",
        "==",
        clienteId
      ),

      where(
        "status",
        "in",
        [
          "andamento",
          "vencida",
          "perdida"
        ]
      )

    );

  }

  // CALENDÁRIO
  const calendar =
    new FullCalendar.Calendar(
      calendarEl,
      {

        initialView:"dayGridMonth",

        locale:"pt-br",

        height:"auto",

        expandRows:true,

        headerToolbar:{
          left:"prev,next today",
          center:"title",
          right:
            "dayGridMonth,timeGridWeek,listWeek"
        },

        events:[]

      }
    );

  calendar.render();

  // TEMPO REAL
  onSnapshot(q, (snapshot)=>{

    const eventos = [];

    snapshot.forEach((docItem)=>{

      const l = docItem.data();

      if(!l.dataSessao) return;

      eventos.push({

        id:docItem.id,

        title:
          `${l.orgao || ""}`,

        start:
          l.dataSessao.includes("/")
          ? l.dataSessao
              .split("/")
              .reverse()
              .join("-")
          : l.dataSessao,

        color:
          corStatus(l.status),

        extendedProps:{

          orgao:l.orgao,

          objeto:l.objeto,

          status:l.status,

          valor:l.valor,

          clienteNome:
            clientesMap[
              l.clienteId
            ] || "Desconhecido",

          linkEdital:
            l.linkEdital

        }

      });

    });

    calendar.removeAllEvents();

    calendar.addEventSource(
      eventos
    );

  });

  // CLICK EVENTO
  calendar.on(
    "eventClick",
    function(info){

      const p =
        info.event.extendedProps;

      abrirDrawer(`

        <div class="item">
          <strong>Órgão:</strong>
          ${p.orgao || "-"}
        </div>

        <div class="item">
          <strong>Objeto:</strong>
          ${p.objeto || "-"}
        </div>

        <div class="item">
          <strong>Status:</strong>
          ${p.status || "-"}
        </div>

        <div class="item">
          <strong>Valor:</strong>
          ${p.valor || "-"}
        </div>

        <div class="item">
          <strong>Cliente:</strong>
          ${p.clienteNome || "-"}
        </div>

        <div class="item">

          <strong>Edital:</strong><br><br>

          ${
            p.linkEdital
            ? `
              <a
                href="${p.linkEdital}"
                target="_blank"
                style="
                  color:#d8a84e;
                  word-break:break-all;
                "
              >
                Abrir edital
              </a>
            `
            : "Não informado"
          }

        </div>

      `);

    }
  );

}

</script>

</body>
</html>
