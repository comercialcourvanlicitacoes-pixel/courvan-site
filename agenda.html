<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Agenda de Licitações - Courvan</title>

<link
  href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter', sans-serif;
}

body{
  background:#060b13; /* Fundo institucional */
  color:#f1f5f9;
  min-height:100vh;
  padding:40px;
}

h2{
  text-align:center;
  color:#e5b85c; /* Dourado Courvan */
  margin-bottom:30px;
  font-size: 32px;
  font-weight: 700;
}

/* CALENDÁRIO COM GLASSMORPHISM */
#calendar-container{
  width:100%;
  max-width:1400px;
  margin:0 auto;
}

#calendar{
  background: rgba(13, 25, 44, 0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding:30px;
  border-radius:28px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  min-height:78vh;
}

/* FULLCALENDAR CUSTOMIZADO */
.fc{
  height:100%;
}

.fc-toolbar-title{
  color:white;
  font-size:22px !important;
  font-weight: 600;
}

.fc-button{
  background:#0e1e36 !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
  color: #94a3b8 !important;
  border-radius: 8px !important;
  text-transform: capitalize;
}

.fc-button-active{
  background:linear-gradient(135deg, #e5b85c 0%, #d8a84e 100%) !important;
  color:#060b13 !important;
  border: none !important;
  font-weight: 600;
}

.fc-daygrid-day{
  background: rgba(255,255,255,0.02);
}

.fc-col-header-cell{
  background: rgba(255,255,255,0.03);
  padding: 10px 0;
}

.fc-scrollgrid{
  border: 1px solid rgba(255,255,255,0.05) !important;
  border-radius: 12px;
  overflow: hidden;
}

.fc-theme-standard td,
.fc-theme-standard th{
  border-color:rgba(255,255,255,0.05) !important;
}

.fc-event{
  border:none !important;
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  cursor: pointer;
}

/* DRAWER PREMIUM */
#drawerOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display:none;
  z-index:999;
}

#drawer{
  position:fixed;
  right:-420px;
  top:0;
  width:400px;
  max-width:100%;
  height:100%;
  background: #091322;
  padding:30px;
  transition:0.4s cubic-bezier(0.4, 0, 0.2, 1);
  z-index:1000;
  overflow-y:auto;
  border-left: 1px solid rgba(229, 184, 92, 0.2);
}

#drawer.open{
  right:0;
}

#drawerOverlay.show{
  display:block;
}

.drawer-title{
  color:#e5b85c;
  font-size:24px;
  font-weight: 700;
  margin-bottom:30px;
  padding-bottom: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.item{
  margin-bottom:20px;
  line-height:1.6;
  color: #cbd5e1;
}

.item strong {
    color: #94a3b8;
    display: block;
    margin-bottom: 4px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.btn-fechar{
  margin-top:30px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg, #e5b85c 0%, #d8a84e 100%);
  color:#060b13;
  font-weight:700;
  cursor:pointer;
  transition: 0.2s;
}

.btn-fechar:hover {
    opacity: 0.9;
    transform: translateY(-2px);
}

/* MOBILE */
@media(max-width:768px){

  body{
    padding:10px;
  }

  #calendar{
    padding:10px;
    min-height:85vh;
  }

  .fc-toolbar{
    flex-direction:column;
    gap:10px;
  }

  .fc-toolbar-title{
    font-size:18px !important;
  }

  #drawer{
    width:100%;
  }

}

</style>
</head>

<body>

<div style="display: flex; align-items: center; justify-content: space-between; max-width: 1400px; margin: 0 auto 30px auto; gap: 16px; flex-wrap: wrap;">
  <button onclick="window.voltarPainel()" style="
    padding: 12px 22px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.04);
    color: #e5b85c;
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  "
  onmouseover="this.style.background='rgba(255,255,255,0.08)'; this.style.transform='translateX(-2px)';"
  onmouseout="this.style.background='rgba(255,255,255,0.04)'; this.style.transform='none';">
    ← Voltar ao Painel
  </button>
  
  <h2 style="margin: 0; font-size: 28px; font-weight: 700; color: #e5b85c;">📅 Agenda de Licitações</h2>
  
  <div style="width: 160px; display: block;" class="hide-mobile"></div>
</div>

<div id="calendar-container">
  <div id="calendar"></div>
</div>

<div
  id="drawerOverlay"
  onclick="fecharDrawer()"
></div>

<div id="drawer">

  <div class="drawer-title">
    📌 Detalhes da Licitação
  </div>

  <div id="drawerContent"></div>

  <button
    class="btn-fechar"
    onclick="fecharDrawer()"
  >
    Fechar
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<script type="module">

import {
  initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getAuth,
  onAuthStateChanged,
  setPersistence,
  browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoBoaz6huE9gfAtBR4qf1ItMWzSwCEvLs",
  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

await setPersistence(
  auth,
  browserLocalPersistence
);

/* =========================
   STATUS COLOR
========================= */
function corStatus(status){

  const s = (status || "")
    .toLowerCase()
    .trim();

  switch(s){

    case "andamento":
      return "#e5b85c";

    case "vencida":
      return "#10b981";

    case "perdida":
      return "#ef4444";

    default:
      return "#94a3b8";
  }

}

/* =========================
   DRAWER
========================= */
window.abrirDrawer = function(html){

  document.getElementById(
    "drawerContent"
  ).innerHTML = html;

  document
    .getElementById("drawer")
    .classList.add("open");

  document
    .getElementById("drawerOverlay")
    .classList.add("show");

  document.body.style.overflow = "hidden";

};

window.fecharDrawer = function(){

  document
    .getElementById("drawer")
    .classList.remove("open");

  document
    .getElementById("drawerOverlay")
    .classList.remove("show");

  document.body.style.overflow = "auto";

};

window.voltarPainel = function() {
  if (auth.currentUser) {
    if (auth.currentUser.email === "comercial.courvanlicitacoes@gmail.com") {
      window.location.href = "clientes.html";
    } else {
      window.location.href = "cliente.html";
    }
  } else {
    window.location.href = "login.html";
  }
};

/* =========================
   LOGIN
========================= */
onAuthStateChanged(auth, async (user)=>{

  if(!user){

    window.location.href =
      "login.html";

    return;

  }

  let clienteId = null;

  // ADMIN
  if(
    user.email !==
    "comercial.courvanlicitacoes@gmail.com"
  ){

    const snap = await getDocs(

      query(
        collection(db, "clientes"),
        where("uid", "==", user.uid)
      )

    );

    if(snap.empty) return;

    clienteId = snap.docs[0].id;

  }

  iniciarCalendario(clienteId);

});

/* =========================
   CALENDÁRIO
========================= */
async function iniciarCalendario(clienteId){

  const calendarEl =
    document.getElementById(
      "calendar"
    );

  // CLIENTES
  const clientesSnap =
    await getDocs(
      collection(db, "clientes")
    );

  const clientesMap = {};

  clientesSnap.forEach(c=>{

    clientesMap[c.id] =
      c.data().nome;

  });

  // QUERY
  let q;

  if(!clienteId){

    // ADMIN
    q = query(
      collection(db, "licitacoes"),
      where(
        "status",
        "in",
        [
          "andamento",
          "vencida",
          "perdida"
        ]
      )
    );

  }else{

    // CLIENTE
    q = query(

      collection(db, "licitacoes"),

      where(
        "clienteId",
        "==",
        clienteId
      ),

      where(
        "status",
        "in",
        [
          "andamento",
          "vencida",
          "perdida"
        ]
      )

    );

  }

  // CALENDÁRIO
  const calendar =
    new FullCalendar.Calendar(
      calendarEl,
      {

        initialView:"dayGridMonth",

        locale:"pt-br",

        height:"auto",

        expandRows:true,

        headerToolbar:{
          left:"prev,next today",
          center:"title",
          right:
            "dayGridMonth,timeGridWeek,listWeek"
        },

        events:[]

      }
    );

  calendar.render();

  // TEMPO REAL
  onSnapshot(q, (snapshot)=>{

    const eventos = [];

    snapshot.forEach((docItem)=>{

      const l = docItem.data();

      if(!l.dataSessao) return;

      eventos.push({

        id:docItem.id,

        title:
          `${l.orgao || ""}`,

        start:
          l.dataSessao.includes("/")
          ? l.dataSessao
              .split("/")
              .reverse()
              .join("-")
          : l.dataSessao,

        color:
          corStatus(l.status),

        extendedProps:{

          orgao:l.orgao,

          objeto:l.objeto,

          status:l.status,

          valor:l.valor,

          clienteNome:
            clientesMap[
              l.clienteId
            ] || "Desconhecido",

          linkEdital:
            l.linkEdital

        }

      });

    });

    calendar.removeAllEvents();

    calendar.addEventSource(
      eventos
    );

  });

  // CLICK EVENTO
  calendar.on(
    "eventClick",
    function(info){

      const p =
        info.event.extendedProps;

      abrirDrawer(`

        <div class="item">
          <strong>Órgão:</strong>
          ${p.orgao || "-"}
        </div>

        <div class="item">
          <strong>Objeto:</strong>
          ${p.objeto || "-"}
        </div>

        <div class="item">
          <strong>Status:</strong>
          ${p.status || "-"}
        </div>

        <div class="item">
          <strong>Valor:</strong>
          ${p.valor || "-"}
        </div>

        <div class="item">
          <strong>Cliente:</strong>
          ${p.clienteNome || "-"}
        </div>

        <div class="item">

          <strong>Edital:</strong><br><br>

          ${
            p.linkEdital
            ? `
              <a
                href="${p.linkEdital}"
                target="_blank"
                style="
                  color:#e5b85c;
                  text-decoration: none;
                  font-weight: 600;
                  word-break:break-all;
                "
              >
                Abrir edital ↗
              </a>
            `
            : "Não informado"
          }

        </div>

      `);

    }
  );

}

</script>

</body>
</html>
