name: Radar Courvan

on:
  workflow_dispatch:

jobs:
  executar-radar:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Executar Radar
        run: node radar.js
