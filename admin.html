<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Admin - Courvan</title>
</head>

<body>

<h2>Criar Cliente</h2>

<input id="nome" placeholder="Nome"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="senha" placeholder="Senha"><br><br>
<input id="empresa" placeholder="Empresa"><br><br>

<button onclick="criarUsuario()">Criar Cliente</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoBoaz6huE9gfAtBR4qf1ItMWzSwCEvLs",
  authDomain: "courvan-sistema.firebaseapp.com",
  projectId: "courvan-sistema",
  storageBucket: "courvan-sistema.appspot.com",
  messagingSenderId: "729755072978",
  appId: "1:729755072978:web:e76e98fd704c10da34f00b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔥 FUNÇÃO CORRETA */
window.criarUsuario = async function () {

  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;
  const empresa = document.getElementById("empresa").value;

  if (!nome || !email || !senha || !empresa) {
    alert("Preencha todos os campos");
    return;
  }

  const cred = await createUserWithEmailAndPassword(auth, email, senha);

  const uid = cred.user.uid;

  await addDoc(collection(db, "clientes"), {
    nome,
    email,
    empresa,
    uid,
    status: "ativo"
  });

  alert("Cliente criado com sucesso!");
};

</script>

</body>
</html>
