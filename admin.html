<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Courvan</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#07162b;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .box{
      width:100%;
      max-width:450px;
      background:#0c2748;
      padding:35px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    h2{
      color:#d8a84e;
      margin-bottom:25px;
      text-align:center;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:15px;
      border:none;
      border-radius:10px;
      background:#16385f;
      color:white;
      font-size:15px;
    }

    input::placeholder{
      color:#c7d5e5;
    }

    button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      background:#d8a84e;
      color:#07162b;
      font-weight:bold;
      font-size:15px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
    }

    .info{
      margin-top:20px;
      font-size:14px;
      opacity:0.85;
      line-height:1.6;
    }

  </style>
</head>

<body>

<div class="box">

  <h2 id="tituloPagina">➕ Criar Cliente</h2>

  <input id="nome" placeholder="Nome">

  <input id="email" type="email" placeholder="Email">

  <input id="senha" type="password" placeholder="Senha">

  <input id="empresa" placeholder="Empresa">

  <button id="btnSalvar" onclick="salvarCliente()">
    Criar Cliente
  </button>

  <div class="info">
    Ao criar o cliente, o sistema irá:
    <br><br>
    ✅ Criar login no Firebase Authentication
    <br>
    ✅ Criar documento em clientes
    <br>
    ✅ Vincular UID automaticamente
    <br>
    ✅ Criar estrutura de chat automaticamente
  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   FIREBASE CONFIG
========================= */

const firebaseConfig = {

  apiKey: "SUA_API_KEY",

  authDomain: "SEU_AUTH_DOMAIN",

  projectId: "SEU_PROJECT_ID",

  storageBucket: "SEU_STORAGE_BUCKET",

  messagingSenderId: "SEU_MESSAGING_ID",

  appId: "SEU_APP_ID"

};

/* =========================
   INICIALIZA FIREBASE
========================= */

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* =========================
   AUTH PRINCIPAL
========================= */

const auth = getAuth(app);

/* =========================
   AUTH SECUNDÁRIO
   (para não deslogar admin)
========================= */

const secondaryApp = initializeApp(
  firebaseConfig,
  "Secondary"
);

const secondaryAuth = getAuth(secondaryApp);

/* =========================
   URL PARAMS
========================= */

const urlParams = new URLSearchParams(window.location.search);

const clienteId = urlParams.get("id");

let modoEdicao = false;

/* =========================
   CARREGAR CLIENTE
========================= */

async function carregarCliente(){

  if(!clienteId) return;

  modoEdicao = true;

  const clienteRef = doc(db, "clientes", clienteId);

  const clienteSnap = await getDoc(clienteRef);

  if(!clienteSnap.exists()){

    alert("Cliente não encontrado");

    return;

  }

  const cliente = clienteSnap.data();

  document.getElementById("nome").value = cliente.nome || "";

  document.getElementById("empresa").value = cliente.empresa || "";

  document.getElementById("email").value = cliente.email || "";

  document.getElementById("tituloPagina").innerText = "✏️ Editar Cliente";

  document.getElementById("btnSalvar").innerText = "Salvar Alterações";

  /* senha opcional em edição */
  document.getElementById("senha").placeholder =
    "Nova senha (opcional)";

}

/* =========================
   SALVAR CLIENTE
========================= */

window.salvarCliente = async function () {

  try {

    const nome = document.getElementById("nome").value.trim();

    const email = document.getElementById("email").value.trim();

    const senha = document.getElementById("senha").value;

    const empresa = document.getElementById("empresa").value.trim();

    if (!nome || !email || !empresa) {

      alert("Preencha todos os campos");

      return;

    }

    /* ====================================
       MODO EDIÇÃO
    ==================================== */

    if (modoEdicao) {

      const clienteRef = doc(db, "clientes", clienteId);

      await updateDoc(clienteRef, {

        nome,
        email,
        empresa

      });

      alert("Cliente atualizado com sucesso!");

      return;

    }

    /* ====================================
       NOVO CLIENTE
    ==================================== */

    if (!senha) {

      alert("Digite uma senha");

      return;

    }

    /* =========================
       CRIA LOGIN FIREBASE
    ========================= */

    const cred = await createUserWithEmailAndPassword(
      secondaryAuth,
      email,
      senha
    );

    const uid = cred.user.uid;

    /* =========================
       MANTÉM ADMIN LOGADO
    ========================= */

    await secondaryAuth.signOut();

    /* =========================
       CRIA CLIENTE FIRESTORE
    ========================= */

    await setDoc(
      doc(db, "clientes", uid),
      {

        nome,
        email,
        empresa,
        uid,
        status: "ativo"

      }
    );

    /* =========================
       CRIA CHAT AUTOMÁTICO
    ========================= */

    await setDoc(
      doc(db, "chats", uid),
      {

        clienteId: uid,

        criadoEm: new Date()

      }
    );

    /* =========================
       LIMPA CAMPOS
    ========================= */

    document.getElementById("nome").value = "";

    document.getElementById("email").value = "";

    document.getElementById("senha").value = "";

    document.getElementById("empresa").value = "";

    alert("Cliente criado com sucesso!");

  }

  catch (error) {

    console.error(error);

    alert("Erro: " + error.message);

  }

};

/* =========================
   INIT
========================= */

carregarCliente();

</script>

</body>
</html>
